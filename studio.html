<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Studio X</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;user-select:none}
body{background:#07070f;display:flex;align-items:flex-start;justify-content:center;min-height:100vh;padding:20px;font-family:monospace}
#studio{background:#0e0e14;border-radius:12px;color:#ccc;overflow:hidden;width:100%;max-width:900px}
#topbar{background:#16161f;border-bottom:1px solid #2a2a3a;padding:8px 14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#logo{color:#7F77DD;font-size:14px;font-weight:700;letter-spacing:3px}
#transport{display:flex;gap:5px;align-items:center}
.tbtn{background:#1e1e2e;border:0.5px solid #3a3a5a;color:#9a9ac0;border-radius:5px;padding:5px 10px;cursor:pointer;font-size:11px;font-family:monospace;transition:background 0.1s}
.tbtn:hover{background:#2a2a40}
.tbtn.active{background:#534AB7;color:#fff;border-color:#7F77DD}
#bpm-box{display:flex;align-items:center;gap:5px}
#bpm-box label{font-size:10px;color:#666;letter-spacing:1px}
#bpm{background:#1e1e2e;border:0.5px solid #3a3a5a;color:#9FE1CB;border-radius:4px;padding:3px 6px;font-size:12px;font-family:monospace;width:50px}
#time-disp{color:#5DCAA5;font-size:13px;font-weight:700;letter-spacing:2px;min-width:72px}
#key-indicator{background:#1a1a2a;border:0.5px solid #3a3a5a;border-radius:6px;padding:3px 10px;font-size:10px;color:#7F77DD;letter-spacing:1px;min-width:110px;text-align:center}
#main{display:flex;height:500px}
#sidebar{width:136px;background:#13131c;border-right:1px solid #2a2a3a;display:flex;flex-direction:column}
#track-labels{flex:1;overflow:hidden}
.tl{height:52px;border-bottom:0.5px solid #1e1e2a;display:flex;align-items:center;padding:0 8px;gap:5px;cursor:pointer}
.tl:hover{background:#1a1a26}
.tl.selected{background:#1e1e30}
.tl-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.tl-name{font-size:10px;letter-spacing:0.5px;color:#bbb;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tl-mute{width:18px;height:14px;background:#2a2a3a;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:8px;color:#666;cursor:pointer}
.tl-mute.muted{background:#993C1D;color:#F0997B}
#mixer-strip{background:#13131c;border-top:1px solid #2a2a3a;padding:8px;display:flex;flex-direction:column;gap:4px}
#mixer-strip label{font-size:9px;color:#555;letter-spacing:1px}
#vol-sl{width:100%;accent-color:#7F77DD}
#center{flex:1;display:flex;flex-direction:column;overflow:hidden}
#viz-row{height:72px;background:#0d0d16;border-bottom:1px solid #2a2a3a}
#vizC{width:100%;height:100%;display:block}
#beat-header{display:flex;background:#16161f;border-bottom:0.5px solid #2a2a3a}
.bh-cell{flex-shrink:0;text-align:center;font-size:9px;color:#444;padding:3px 0;border-right:0.5px solid #1e1e2a}
#seq-area{flex:1;overflow:hidden}
#seq-grid{position:relative}
.track-row{height:52px;border-bottom:0.5px solid #1a1a26;display:flex;align-items:center;padding-left:3px}
.track-row:nth-child(odd){background:#0f0f18}
.track-row:nth-child(even){background:#111119}
.beat-cell{height:40px;border-radius:4px;border:0.5px solid transparent;cursor:pointer;flex-shrink:0;transition:background 0.08s;margin:0 2px}
.beat-cell.on{border-color:rgba(255,255,255,0.12)}
#piano-wrap{background:#111119;border-top:1px solid #2a2a3a;padding:10px 10px 8px}
#piano-row{display:flex;gap:1px;justify-content:center;position:relative;height:62px;margin-bottom:8px}
.pk-w{width:26px;height:56px;background:#e8e5e0;border-radius:0 0 4px 4px;border:0.5px solid #999;cursor:pointer;transition:background 0.08s;flex-shrink:0;display:flex;align-items:flex-end;justify-content:center;padding-bottom:3px}
.pk-w span{font-size:7px;color:#888}
.pk-w:active,.pk-w.lit{background:#9FE1CB}
.pk-w.lit span{color:#085041}
.pk-b{width:17px;height:34px;background:#181826;border-radius:0 0 3px 3px;cursor:pointer;position:absolute;top:0;z-index:2;transition:background 0.08s;display:flex;align-items:flex-end;justify-content:center;padding-bottom:2px}
.pk-b span{font-size:6px;color:#444}
.pk-b:active,.pk-b.lit{background:#7F77DD}
.pk-b.lit span{color:#CECBF6}
#kb-map{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:7px}
.kb-group{background:#1a1a28;border:0.5px solid #2a2a40;border-radius:6px;padding:4px 8px;display:flex;gap:4px;align-items:center}
.kb-group label{font-size:8px;color:#534AB7;letter-spacing:1px;margin-right:2px}
.kb-key{background:#252535;border:0.5px solid #3a3a5a;border-radius:3px;padding:2px 5px;font-size:9px;color:#9a9ac0;min-width:20px;text-align:center;transition:background 0.08s}
.kb-key.active-k{background:#534AB7;color:#fff;border-color:#7F77DD}
#fx-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
#fx-row label{font-size:9px;color:#555;letter-spacing:1px}
#fx-row input[type=range]{width:64px;accent-color:#5DCAA5}
#fx-row select{background:#1a1a2e;color:#9FE1CB;border:0.5px solid #2a2a4a;border-radius:4px;padding:2px 5px;font-size:10px;font-family:monospace}
#fx-row span.val{font-size:10px;color:#5DCAA5;min-width:24px}
</style>
</head>
<body>
<div id="studio">
  <div id="topbar">
    <div id="logo">STUDIO X</div>
    <div id="transport">
      <button class="tbtn" onclick="rewind()">&#9664;&#9664;</button>
      <button class="tbtn" id="btn-play" onclick="togglePlay()">&#9654; PLAY</button>
      <button class="tbtn" id="btn-rec" onclick="toggleRec()">&#9679; REC</button>
      <button class="tbtn" onclick="stopAll()">&#9632; STOP</button>
    </div>
    <div id="bpm-box">
      <label>BPM</label>
      <input id="bpm" type="number" value="120" min="40" max="220" onchange="bpm=parseInt(this.value)||120">
    </div>
    <div id="time-disp">0:00.0</div>
    <div id="key-indicator">OCT 4 — ROW 2</div>
    <div style="margin-left:auto;display:flex;gap:5px">
      <button class="tbtn" onclick="clearAll()">CLEAR</button>
      <button class="tbtn" onclick="randomPattern()">RANDOM</button>
    </div>
  </div>

  <div id="main">
    <div id="sidebar">
      <div id="track-labels"></div>
      <div id="mixer-strip">
        <label>MASTER VOL</label>
        <input id="vol-sl" type="range" min="0" max="100" value="75"
          oninput="if(masterGain)masterGain.gain.value=this.value/100">
      </div>
    </div>
    <div id="center">
      <div id="viz-row"><canvas id="vizC"></canvas></div>
      <div id="beat-header"></div>
      <div id="seq-area"><div id="seq-grid"></div></div>
      <div id="piano-wrap">
        <div id="piano-row"></div>
        <div id="kb-map">
          <div class="kb-group">
            <label>ROW 1 — OCT 3</label>
            <span class="kb-key" id="kk-q">Q</span><span class="kb-key" id="kk-w">W</span>
            <span class="kb-key" id="kk-e">E</span><span class="kb-key" id="kk-r">R</span>
            <span class="kb-key" id="kk-t">T</span><span class="kb-key" id="kk-y">Y</span>
            <span class="kb-key" id="kk-u">U</span><span class="kb-key" id="kk-i">I</span>
            <span class="kb-key" id="kk-o">O</span><span class="kb-key" id="kk-p">P</span>
          </div>
          <div class="kb-group">
            <label>ROW 2 — OCT 4</label>
            <span class="kb-key" id="kk-a">A</span><span class="kb-key" id="kk-s">S</span>
            <span class="kb-key" id="kk-d">D</span><span class="kb-key" id="kk-f">F</span>
            <span class="kb-key" id="kk-g">G</span><span class="kb-key" id="kk-h">H</span>
            <span class="kb-key" id="kk-j">J</span><span class="kb-key" id="kk-k">K</span>
            <span class="kb-key" id="kk-l">L</span>
          </div>
          <div class="kb-group">
            <label>ROW 3 — OCT 5</label>
            <span class="kb-key" id="kk-z">Z</span><span class="kb-key" id="kk-x">X</span>
            <span class="kb-key" id="kk-c">C</span><span class="kb-key" id="kk-v">V</span>
            <span class="kb-key" id="kk-b">B</span><span class="kb-key" id="kk-n">N</span>
            <span class="kb-key" id="kk-m">M</span>
          </div>
          <div class="kb-group">
            <label>DRUMS</label>
            <span class="kb-key" id="kk-1">1</span><span class="kb-key" id="kk-2">2</span>
            <span class="kb-key" id="kk-3">3</span><span class="kb-key" id="kk-4">4</span>
            <span class="kb-key" id="kk-5">5</span><span class="kb-key" id="kk-6">6</span>
          </div>
          <div class="kb-group">
            <label>CTRL</label>
            <span class="kb-key">SPC=play</span>
            <span class="kb-key">&uarr;=oct+</span>
            <span class="kb-key">&darr;=oct-</span>
          </div>
        </div>
        <div id="fx-row">
          <label>WAVE</label>
          <select id="wt">
            <option value="sine">SINE</option>
            <option value="square">SQR</option>
            <option value="sawtooth">SAW</option>
            <option value="triangle">TRI</option>
          </select>
          <label>REVERB</label>
          <input type="range" min="0" max="100" value="20" id="rev-sl"
            oninput="document.getElementById('rev-v').textContent=this.value">
          <span class="val" id="rev-v">20</span>
          <label>DELAY</label>
          <input type="range" min="0" max="100" value="0" id="del-sl"
            oninput="document.getElementById('del-v').textContent=this.value">
          <span class="val" id="del-v">0</span>
          <label>OCT</label>
          <select id="oct">
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4" selected>4</option>
            <option value="5">5</option>
            <option value="6">6</option>
          </select>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const TRACKS = [
  {name:'KICK',  color:'#E24B4A', pattern:[], muted:false},
  {name:'SNARE', color:'#EF9F27', pattern:[], muted:false},
  {name:'HIHAT', color:'#5DCAA5', pattern:[], muted:false},
  {name:'CLAP',  color:'#7F77DD', pattern:[], muted:false},
  {name:'BASS',  color:'#D4537E', pattern:[], muted:false},
  {name:'LEAD',  color:'#378ADD', pattern:[], muted:false},
];
TRACKS.forEach(t => t.pattern = Array(16).fill(false));

const CELL_W = 32;
let audioCtx, masterGain, analyser, analyserData;
let isPlaying = false, isRec = false;
let currentBeat = 0, bpm = 120, beatTimer = null;
let startTime = 0, elapsed = 0, tickInterval;
let activeOscs = {};

const ROW1_MAP = {q:0, w:2, e:4, r:5, t:7, y:9, u:11, i:12, o:14, p:16};
const ROW2_MAP = {a:0, s:2, d:4, f:5, g:7, h:9, j:11, k:12, l:14};
const ROW3_MAP = {z:0, x:2, c:4, v:5, b:7, n:9, m:11};
const DRUM_MAP = {'1':0, '2':1, '3':2, '4':3, '5':4, '6':5};

function getKeyInfo(k) {
  if (ROW1_MAP[k] !== undefined) return {semi: ROW1_MAP[k], oct: 3};
  if (ROW2_MAP[k] !== undefined) return {semi: ROW2_MAP[k], oct: 4};
  if (ROW3_MAP[k] !== undefined) return {semi: ROW3_MAP[k], oct: 5};
  return null;
}

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain(); masterGain.gain.value = 0.75;
  analyser = audioCtx.createAnalyser(); analyser.fftSize = 512;
  analyserData = new Uint8Array(analyser.frequencyBinCount);
  masterGain.connect(analyser); analyser.connect(audioCtx.destination);
}

function noteFreq(s, oct) { return 440 * Math.pow(2, (s - 9 + (oct - 4) * 12) / 12); }

function playNote(semi, oct, id) {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (activeOscs[id]) return;
  const wave = document.getElementById('wt').value;
  const rev  = document.getElementById('rev-sl').value / 100;
  const del  = document.getElementById('del-sl').value / 100;
  const osc  = audioCtx.createOscillator();
  const g    = audioCtx.createGain();
  osc.type = wave;
  osc.frequency.value = noteFreq(semi, oct);
  g.gain.setValueAtTime(0.001, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.4, audioCtx.currentTime + 0.02);
  osc.connect(g); g.connect(masterGain);
  if (rev > 0) {
    const rg = audioCtx.createGain(); rg.gain.value = rev * 0.6;
    const d = audioCtx.createDelay(); d.delayTime.value = 0.25;
    g.connect(d); d.connect(rg); rg.connect(masterGain);
  }
  if (del > 0) {
    const dg = audioCtx.createGain(); dg.gain.value = del * 0.4;
    const dd = audioCtx.createDelay(); dd.delayTime.value = 0.375;
    g.connect(dd); dd.connect(dg); dg.connect(masterGain);
  }
  osc.start();
  activeOscs[id] = {osc, g};
}

function stopNote(id) {
  if (!activeOscs[id]) return;
  const {osc, g} = activeOscs[id];
  g.gain.setValueAtTime(g.gain.value, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.35);
  osc.stop(audioCtx.currentTime + 0.37);
  delete activeOscs[id];
}

function playDrum(ti, when) {
  if (!audioCtx || TRACKS[ti].muted) return;
  const osc = audioCtx.createOscillator();
  const g   = audioCtx.createGain();
  const freqs  = [58, 200, 800, 1100, 100, 440];
  const decays = [0.3, 0.2, 0.1, 0.15, 0.4, 0.5];
  osc.frequency.value = freqs[ti] || 200;
  if (ti === 2 || ti === 3) osc.type = 'square';
  g.gain.setValueAtTime(0.001, when);
  g.gain.exponentialRampToValueAtTime(0.7, when + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, when + decays[ti]);
  osc.connect(g); g.connect(masterGain);
  osc.start(when); osc.stop(when + decays[ti] + 0.05);
}

function tick() {
  if (!isPlaying) return;
  const now = audioCtx.currentTime;
  TRACKS.forEach((t, ti) => { if (t.pattern[currentBeat]) playDrum(ti, now); });
  highlightBeat(currentBeat);
  currentBeat = (currentBeat + 1) % 16;
  beatTimer = setTimeout(tick, (60 / bpm / 4) * 1000);
}

function togglePlay() {
  initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (isPlaying) {
    isPlaying = false; clearTimeout(beatTimer);
    document.getElementById('btn-play').classList.remove('active'); return;
  }
  isPlaying = true; document.getElementById('btn-play').classList.add('active');
  startTime = Date.now() - elapsed; tick();
  tickInterval = setInterval(() => {
    if (!isPlaying) return;
    elapsed = Date.now() - startTime;
    const s = elapsed / 1000, m = Math.floor(s / 60);
    const sec = Math.floor(s % 60), ds = Math.floor((s % 1) * 10);
    document.getElementById('time-disp').textContent = `${m}:${String(sec).padStart(2,'0')}.${ds}`;
  }, 80);
}

function stopAll() {
  isPlaying = false; isRec = false; currentBeat = 0; elapsed = 0;
  clearTimeout(beatTimer); clearInterval(tickInterval);
  document.getElementById('btn-play').classList.remove('active');
  document.getElementById('btn-rec').classList.remove('active');
  highlightBeat(-1);
  document.getElementById('time-disp').textContent = '0:00.0';
}

function rewind() { stopAll(); }

function toggleRec() {
  isRec = !isRec;
  document.getElementById('btn-rec').classList.toggle('active', isRec);
}

function highlightBeat(b) {
  document.querySelectorAll('.beat-cell').forEach(c => {
    c.style.outline = parseInt(c.dataset.beat) === b ? '2px solid rgba(255,255,255,0.35)' : 'none';
  });
}

function clearAll() {
  TRACKS.forEach(t => t.pattern.fill(false));
  document.querySelectorAll('.beat-cell').forEach(c => {
    c.style.background = '#1a1a26'; c.classList.remove('on');
  });
}

function randomPattern() {
  const density = [0.5, 0.3, 0.6, 0.2, 0.3, 0.25];
  TRACKS.forEach((t, ti) => { t.pattern = t.pattern.map(() => Math.random() < density[ti]); });
  document.querySelectorAll('.beat-cell').forEach(c => {
    const ti = parseInt(c.dataset.ti), b = parseInt(c.dataset.beat);
    const on = TRACKS[ti].pattern[b];
    c.style.background = on ? TRACKS[ti].color : '#1a1a26';
    c.classList.toggle('on', on);
  });
}

function buildUI() {
  const labels = document.getElementById('track-labels');
  const grid   = document.getElementById('seq-grid');
  const hdr    = document.getElementById('beat-header');
  for (let b = 0; b < 16; b++) {
    const bh = document.createElement('div');
    bh.className = 'bh-cell'; bh.style.width = CELL_W + 'px'; bh.textContent = b + 1;
    hdr.appendChild(bh);
  }
  TRACKS.forEach((t, ti) => {
    const lbl = document.createElement('div');
    lbl.className = 'tl'; lbl.dataset.ti = ti;
    lbl.innerHTML = `<div class="tl-dot" style="background:${t.color}"></div><div class="tl-name">${t.name}</div><div class="tl-mute" id="mute-${ti}">M</div>`;
    lbl.querySelector('.tl-mute').onclick = e => {
      e.stopPropagation(); t.muted = !t.muted;
      lbl.querySelector('.tl-mute').classList.toggle('muted', t.muted);
    };
    if (ti === 0) lbl.classList.add('selected');
    labels.appendChild(lbl);
    const row = document.createElement('div'); row.className = 'track-row';
    for (let b = 0; b < 16; b++) {
      const cell = document.createElement('div');
      cell.className = 'beat-cell';
      cell.dataset.ti = ti; cell.dataset.beat = b;
      cell.style.width = (CELL_W - 4) + 'px';
      cell.style.background = '#1a1a26';
      cell.onclick = () => {
        t.pattern[b] = !t.pattern[b];
        cell.style.background = t.pattern[b] ? t.color : '#1a1a26';
        cell.classList.toggle('on', t.pattern[b]);
        if (t.pattern[b]) {
          initAudio();
          if (audioCtx.state === 'suspended') audioCtx.resume();
          playDrum(ti, audioCtx.currentTime);
        }
      };
      row.appendChild(cell);
    }
    grid.appendChild(row);
  });
}

const WHITE_SEMIS  = [0,2,4,5,7,9,11,12,14,16,17,19,21];
const BLACK_OFFSETS = [1,3,null,6,8,10,null,13,null,18,20,null];
const KEY_LABELS_W = ['C','D','E','F','G','A','B','C','D','E','F','G','A'];
const KEY_LABELS_B = ['C#','D#','','F#','G#','A#','','C#','','D#','E#',''];

function buildPiano() {
  const row = document.getElementById('piano-row');
  WHITE_SEMIS.forEach((semi, i) => {
    const el = document.createElement('div');
    el.className = 'pk-w'; el.dataset.semi = semi;
    el.innerHTML = `<span>${KEY_LABELS_W[i] || ''}</span>`;
    el.onmousedown = () => { playNote(semi, 4, 'm'+semi); el.classList.add('lit'); };
    el.onmouseup   = () => { stopNote('m'+semi); el.classList.remove('lit'); };
    el.onmouseleave = () => { stopNote('m'+semi); el.classList.remove('lit'); };
    row.appendChild(el);
  });
  BLACK_OFFSETS.forEach((semi, i) => {
    if (semi === null) return;
    const bk = document.createElement('div');
    bk.className = 'pk-b'; bk.dataset.semi = semi;
    bk.style.left = (i * 27 + 17) + 'px';
    bk.innerHTML = `<span>${KEY_LABELS_B[i] || ''}</span>`;
    bk.onmousedown = e => { e.stopPropagation(); playNote(semi, 4, 'mb'+semi); bk.classList.add('lit'); };
    bk.onmouseup   = () => { stopNote('mb'+semi); bk.classList.remove('lit'); };
    bk.onmouseleave = () => { stopNote('mb'+semi); bk.classList.remove('lit'); };
    row.appendChild(bk);
  });
}

function flashKey(k, on) {
  const el = document.getElementById('kk-' + k);
  if (el) el.classList.toggle('active-k', on);
}

function updateIndicator(k) {
  const ind = document.getElementById('key-indicator');
  if (ROW1_MAP[k] !== undefined)      ind.textContent = 'OCT 3 — ROW 1 (Q–P)';
  else if (ROW2_MAP[k] !== undefined) ind.textContent = 'OCT 4 — ROW 2 (A–L)';
  else if (ROW3_MAP[k] !== undefined) ind.textContent = 'OCT 5 — ROW 3 (Z–M)';
  else if (DRUM_MAP[k] !== undefined) ind.textContent = `DRUM: ${TRACKS[DRUM_MAP[k]].name}`;
}

document.addEventListener('keydown', e => {
  if (e.repeat || ['INPUT','SELECT','TEXTAREA'].includes(e.target.tagName)) return;
  const k = e.key.toLowerCase();
  if (k === ' ') { e.preventDefault(); togglePlay(); return; }
  if (e.key === 'ArrowUp')   { e.preventDefault(); const o = document.getElementById('oct'); o.value = Math.min(6, parseInt(o.value) + 1); return; }
  if (e.key === 'ArrowDown') { e.preventDefault(); const o = document.getElementById('oct'); o.value = Math.max(2, parseInt(o.value) - 1); return; }
  const ki = getKeyInfo(k);
  if (ki) { playNote(ki.semi, ki.oct, 'kb'+k); flashKey(k, true); updateIndicator(k); }
  if (DRUM_MAP[k] !== undefined) {
    initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
    playDrum(DRUM_MAP[k], audioCtx.currentTime); flashKey(k, true); updateIndicator(k);
  }
});

document.addEventListener('keyup', e => {
  const k = e.key.toLowerCase();
  const ki = getKeyInfo(k);
  if (ki) { stopNote('kb'+k); flashKey(k, false); }
  if (DRUM_MAP[k] !== undefined) flashKey(k, false);
});

const vizC = document.getElementById('vizC');
const vx   = vizC.getContext('2d');
let hue = 200;

function drawViz() {
  requestAnimationFrame(drawViz);
  vizC.width = vizC.offsetWidth; vizC.height = vizC.offsetHeight;
  const W = vizC.width, H = vizC.height;
  vx.fillStyle = 'rgba(13,13,22,0.25)'; vx.fillRect(0, 0, W, H);
  hue = (hue + 0.3) % 360;
  if (!analyser) {
    vx.strokeStyle = '#534AB7'; vx.lineWidth = 1.5; vx.beginPath();
    for (let x = 0; x < W; x++) {
      const y = H / 2 + Math.sin(x / 20 + Date.now() / 1000) * 10;
      x === 0 ? vx.moveTo(x, y) : vx.lineTo(x, y);
    }
    vx.stroke(); return;
  }
  analyser.getByteFrequencyData(analyserData);
  const bw = W / analyserData.length * 2;
  for (let i = 0; i < analyserData.length / 2; i++) {
    const bh = (analyserData[i] / 255) * H * 0.85;
    vx.fillStyle = `hsla(${(hue + i * 2) % 360},65%,55%,0.55)`;
    vx.fillRect(i * bw, H - bh, bw - 1, bh);
  }
  analyser.getByteTimeDomainData(analyserData);
  vx.strokeStyle = `hsl(${hue},60%,70%)`; vx.lineWidth = 1.5; vx.beginPath();
  analyserData.forEach((v, i) => {
    const y = (v / 128) * (H / 2);
    i === 0 ? vx.moveTo(0, y) : vx.lineTo(i * (W / analyserData.length), y);
  });
  vx.stroke();
}

buildUI();
buildPiano();
drawViz();
</script>
